name: Deploy

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy-contracts:
    name: Deploy Smart Contracts
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Clarinet
      uses: hirosystems/clarinet-action@v1
      with:
        clarinet-version: "0.27.0"
    
    - name: Deploy to testnet
      run: |
        cd packages/contracts
        clarinet deploy --testnet
      env:
        STACKS_PRIVATE_KEY: ${{ secrets.STACKS_PRIVATE_KEY }}

  deploy-frontend:
    name: Deploy Frontend
    runs-on: ubuntu-latest
    needs: deploy-contracts
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Build
      run: npm run build --workspace=packages/web
      env:
        NEXT_PUBLIC_STACKS_NETWORK: testnet
        NEXT_PUBLIC_CONTRACT_ADDRESS: ${{ secrets.CONTRACT_ADDRESS }}
    
    - name: Deploy to Vercel
      uses: amondnet/vercel-action@v25
      with:
        vercel-token: ${{ secrets.VERCEL_TOKEN }}
        vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
        vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
        working-directory: packages/web

  deploy-subgraph:
    name: Deploy Subgraph
    runs-on: ubuntu-latest
    needs: deploy-contracts
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Generate types and build
      run: |
        npm run codegen --workspace=packages/subgraph
        npm run build --workspace=packages/subgraph
    
    - name: Deploy subgraph
      run: npm run deploy --workspace=packages/subgraph
      env:
        GRAPH_ACCESS_TOKEN: ${{ secrets.GRAPH_ACCESS_TOKEN }}
